<!DOCTYPE html>
<html>
<head>
  <title>{{ data.toponymName }}</title>
  <link rel="stylesheet" href="https://api.tiles.mapbox.com/mapbox-gl-js/v1.3.1/mapbox-gl.css">
  <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v1.3.1/mapbox-gl.js"></script>
  <style>
    body { font-family: sans-serif; margin: 10px; font-size: 13px; }
    h1 { font-size: 1.1em; margin-bottom: 4px; }
    #map { width: 100%; height: 200px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>{{ data.toponymName }}</h1>
  <p>
    {{ data.toponymName }}, {{ data.countryName }}
    {% if data.wikipediaURL %}
    — <a href="https://{{ data.wikipediaURL }}" target="_blank">Wikipedia</a>
    {% endif %}
  </p>

  <div id="map"></div>

  {% if token and data.bbox %}
  <script>
    mapboxgl.accessToken = "{{ token }}";
    var map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v10',
      center: [{{ data.bbox.east }}, {{ data.bbox.south }}],
      zoom: 4
    });
    map.on('load', function () {
      map.addLayer({
        "id": "geoname",
        "type": "fill",
        "paint": { "fill-color": "#666666", "fill-opacity": 0.5 },
        "source": {
          "type": "geojson",
          "data": {
            "type": "Feature",
            "geometry": {
              "type": "Polygon",
              "coordinates": [[
                [{{ data.bbox.east }}, {{ data.bbox.north }}],
                [{{ data.bbox.east }}, {{ data.bbox.south }}],
                [{{ data.bbox.west }}, {{ data.bbox.south }}],
                [{{ data.bbox.west }}, {{ data.bbox.north }}],
                [{{ data.bbox.east }}, {{ data.bbox.north }}]
              ]]
            }
          }
        }
      });
    });
  </script>
  {% endif %}
</body>
</html>
